name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -e .  # Install devcontext in editable mode
      
      - name: Run tests
        run: |
          cd /home/runner/work/devcontext
          pytest tests/ -v --tb=short
        env:
          PYTHONPATH: /home/runner/work/devcontext/devcontext/src:$PYTHONPATH
      
      - name: Upload coverage
        if: success()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false